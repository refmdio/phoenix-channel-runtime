name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Build native documentation
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - name: Build browser documentation
        run: >-
          cargo doc
          -p phoenix-channel-runtime
          -p phoenix-channel-client
          -p phoenix-channel-runtime-web
          --target wasm32-unknown-unknown
          --all-features
          --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - name: Assemble site
        run: |
          mkdir -p target/pages
          cp pages/index.html target/pages/index.html
          cp -R target/doc target/pages/native
          cp -R target/wasm32-unknown-unknown/doc target/pages/web
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: target/pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
