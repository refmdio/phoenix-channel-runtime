name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
          targets: wasm32-unknown-unknown
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo check -p phoenix-channel-runtime --target wasm32-unknown-unknown
      - run: cargo check -p phoenix-channel-client --target wasm32-unknown-unknown
      - run: cargo check -p phoenix-channel-runtime-web --target wasm32-unknown-unknown
