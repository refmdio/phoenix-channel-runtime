name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        rust: ["1.85.0", stable]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy,rustfmt
      - run: cargo fmt --all -- --check
      - if: matrix.rust == 'stable'
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - if: matrix.rust == 'stable' && matrix.os == 'ubuntu-latest'
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - run: cargo test --workspace --all-features

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo check -p phoenix-channel-runtime --target wasm32-unknown-unknown
      - run: cargo check -p phoenix-channel-client --all-features --target wasm32-unknown-unknown
      - run: cargo check -p phoenix-channel-runtime-web --target wasm32-unknown-unknown
      - run: cargo rustdoc -p phoenix-channel-runtime-web --target wasm32-unknown-unknown -- -D warnings

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo package --workspace --no-verify

  fuzz-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-fuzz --locked --version 0.13.2
      - run: cargo fuzz build codec

  phoenix-e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        phoenix: ["~> 1.7.0", "~> 1.8.0"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"
      - run: mix deps.unlock --all
        working-directory: tests/fixtures/phoenix_server
        env:
          PHOENIX_VERSION: ${{ matrix.phoenix }}
      - run: mix deps.get
        working-directory: tests/fixtures/phoenix_server
        env:
          PHOENIX_VERSION: ${{ matrix.phoenix }}
      - run: cargo test -p phoenix-channel-runtime-native --test phoenix_server
        env:
          PHOENIX_E2E: "1"
          PHOENIX_VERSION: ${{ matrix.phoenix }}

  browser-e2e:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chrome
            os: ubuntu-latest
          - browser: firefox
            os: ubuntu-latest
          - browser: safari
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"
      - run: mix deps.get
        working-directory: tests/fixtures/phoenix_server
      - run: mix run --no-halt > /tmp/phoenix-channel-fixture.log 2>&1 &
        working-directory: tests/fixtures/phoenix_server
        env:
          PORT: "4056"
      - run: cargo install wasm-pack --locked --version 0.13.1
      - if: matrix.browser == 'safari'
        run: sudo safaridriver --enable
      - if: matrix.browser != 'safari'
        run: wasm-pack test --headless --${{ matrix.browser }} crates/phoenix-channel-runtime-web
      - if: matrix.browser == 'safari'
        run: wasm-pack test --safari crates/phoenix-channel-runtime-web
